[profile.default]
src = "contracts"
test = "contracts/test"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "erc4626-tests/=lib/openzeppelin-contracts/lib/erc4626-tests/",
]

# Allow Deploy.s.sol to write the deployment JSON. Scoped read-write so
# downstream tools (rmpc config loader, e2e harness) can read it back.
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read-write", path = "/tmp" },
    { access = "read-write", path = "/repo/deployments" },
    # Read-only access to docs/ so foundry regression tests can grep for
    # canonical production-readiness warnings (issue #427).
    { access = "read", path = "./docs" },
]

[fmt]
line_length = 100
tab_width = 4
