# rmpc operator config — generated by dapp
# Canonical fixture: dapp-exported rmpc-config.toml in flat schema format.
#
# Source of truth: clients/dapp/src/lib/configExport.ts (function
# `exportRmpcConfig`) + clients/rust-payment-client/src/config.rs.
#
# This TOML is directly loadable by Config::from_str with no translation
# helper. The schema is the same flat format rmpc uses (deny_unknown_fields).
#
# Values mirror the dapp's own unit-test base config and the common test
# fixture constants in tests/common/mod.rs:
#   GATEWAY = 0x0000000000000000000000000000000000000b00
#   USDC    = 0x0000000000000000000000000000000000000c00
#   VAULT   = 0x0000000000000000000000000000000000000d00
#
# gateway_runtime_hash is the keccak256 of GATEWAY_CODE (the canned bytes
# used by the test harness); it is a non-zero placeholder that the round-trip
# test overrides with the real hash for the mockito happy-path check.
#
# When clients/dapp/src/lib/configExport.ts changes, regenerate this
# fixture by running the TS export with the unit-test base config and
# overwriting this file.

chain_id             = 31337
rpc_url              = "http://127.0.0.1:8545"
gateway_address      = "0x0000000000000000000000000000000000000b00"
usdc_address         = "0x0000000000000000000000000000000000000c00"
vault_address        = "0x0000000000000000000000000000000000000d00"
gateway_runtime_hash = "0xabababababababababababababababababababababababababababababababababab"

[signer]
allow_software_fallback = true
keystore_path = "./agent.keystore.json"
