# Compose overlay that adds a one-shot `gateway-deployer` service running
# the Foundry deploy script against the Geth devnet started by
# docker-compose.yaml in this directory.
#
# Usage (from testing/ethereum-testnet/config):
#   docker compose -f docker-compose.yaml -f docker-compose.deployer.yaml \
#       up --abort-on-container-exit gateway-deployer
#
# The container uses the pre-funded genesis accounts as ADMIN / PAUSER /
# AGENT / SHARE_RECEIVER (distinct EOAs — see ../scripts/deploy-gateway.sh).
# Output is written to /repo/deployments/devnet.json which is bind-mounted
# back to the host so rmpd + the e2e harness can read it.
name: ethereum-testnet
services:
  gateway-deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: rmoney-gateway-deployer
    depends_on:
      geth:
        condition: service_healthy
    # Foundry image's entrypoint is `anvil`; override.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -euo pipefail
        cd /repo
        echo "[deployer] forge build"
        forge build
        echo "[deployer] forge script Deploy"
        export ADMIN_ADDRESS=0x8943545177806ED17B9F23F0a21ee5948eCaa776
        export PAUSER_ADDRESS=0x71bE63f3384f5fb98995898A86B02Fb2426c5788
        export AGENT_ADDRESS=0xFABB0ac9d68B0B445fB7357272Ff202C5651694a
        export SHARE_RECEIVER_ADDRESS=0x1CBd3b2770909D4e10f157cABC84C7264073C9Ec
        export DEPLOYMENT_OUT=/repo/deployments/devnet.json
        mkdir -p /repo/deployments
        forge script contracts/script/Deploy.s.sol:Deploy \
          --rpc-url http://geth:8545 \
          --private-key 0xbcdf20249abf0ed6d944c0288fad489e33f66b3960d9e6229c1cd214ed3bbe31 \
          --broadcast --slow -vvv
        echo "[deployer] deployment JSON:"
        cat "$$DEPLOYMENT_OUT"
        # cast smoke — gateway view functions return the deployed addresses.
        GATEWAY=$$(grep -o '"gateway":[[:space:]]*"0x[0-9a-fA-F]*"' "$$DEPLOYMENT_OUT" | grep -o '0x[0-9a-fA-F]*')
        USDC=$$(grep -o '"usdc":[[:space:]]*"0x[0-9a-fA-F]*"' "$$DEPLOYMENT_OUT" | grep -o '0x[0-9a-fA-F]*')
        echo "[deployer] cast call gateway.usdc()"
        SMOKE_USDC=$$(cast call --rpc-url http://geth:8545 "$$GATEWAY" 'usdc()(address)')
        echo "  -> $$SMOKE_USDC"
        if [ "$$(echo $$SMOKE_USDC | tr A-Z a-z)" != "$$(echo $$USDC | tr A-Z a-z)" ]; then
          echo "[deployer] FAIL: usdc mismatch" >&2; exit 1
        fi
        echo "[deployer] OK"
    volumes:
      # Mount the repo root read-write so forge can build and write
      # deployments/devnet.json. The path resolves relative to this
      # compose file's directory: testing/ethereum-testnet/config.
      - ../../..:/repo
    working_dir: /repo
    restart: "no"
