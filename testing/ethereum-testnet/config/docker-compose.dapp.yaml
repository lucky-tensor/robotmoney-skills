# Full-stack dapp overlay for the Robot Money devnet.
#
# Canonical: docs/implementation-plan.md §10.5 — Phase 4.5.
# Used by: testing/smoke-test (--full-stack flag, issue #228).
#
# Brings up Postgres, explorer-indexer, explorer-api, and the dapp
# against an already-running Geth+Lighthouse chain. The smoke-test
# binary starts the chain via docker-compose.yaml first, deploys
# contracts, then starts this stack passing deployed addresses as
# build args.
#
# Standalone usage (without the smoke-test binary):
#
#   # Required env vars:
#   #   VITE_GATEWAY_ADDRESS  — deployed gateway contract address
#   #   VITE_VAULT_ADDRESS    — deployed vault contract address
#   #   INDEXER_GATEWAY       — same as VITE_GATEWAY_ADDRESS
#   #   INDEXER_VAULT         — same as VITE_VAULT_ADDRESS
#   #
#   # Optional (defaults shown):
#   #   VITE_EXPLORER_API_URL=http://localhost:8080
#   #   INDEXER_RPC_URL=http://host.docker.internal:8545
#   #   INDEXER_CHAIN_ID=918453
#   #   INDEXER_CHAIN_NAME=devnet
#   #   EXPLORER_API_CHAIN_ID=918453
#   #   POSTGRES_PORT=5432
#   #   EXPLORER_API_PORT=8080
#   #   DAPP_PORT=5173
#   #   POSTGRES_USER=robotmoney
#   #   POSTGRES_PASSWORD=robotmoney
#   #   POSTGRES_DB=explorer
#
#   cd testing/ethereum-testnet/config
#   docker compose -f docker-compose.dapp.yaml up

name: robotmoney-dapp

services:
  postgres:
    image: postgres:16-alpine
    container_name: dapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-robotmoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robotmoney}
      POSTGRES_DB: ${POSTGRES_DB:-explorer}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-robotmoney} -d ${POSTGRES_DB:-explorer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  explorer-indexer:
    build:
      context: ../../..
      dockerfile: services/explorer-indexer/Dockerfile
    container_name: dapp-explorer-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-robotmoney}:${POSTGRES_PASSWORD:-robotmoney}@postgres:5432/${POSTGRES_DB:-explorer}
      INDEXER_RPC_URL: ${INDEXER_RPC_URL:-http://host.docker.internal:8545}
      INDEXER_CHAIN_ID: ${INDEXER_CHAIN_ID:-918453}
      INDEXER_CHAIN_NAME: ${INDEXER_CHAIN_NAME:-devnet}
      INDEXER_RPC_LABEL: ${INDEXER_CHAIN_NAME:-devnet}
      INDEXER_GATEWAY: ${INDEXER_GATEWAY:?INDEXER_GATEWAY must be set}
      INDEXER_VAULT: ${INDEXER_VAULT:?INDEXER_VAULT must be set}
      INDEXER_REGISTRY: ${INDEXER_REGISTRY:-}
      # Bit 2 (INDEXER_MULTI_VAULT_EVENTS) enables VaultRegistered /
      # VaultStatusChanged event ingestion from the VaultRegistry.  Without
      # this flag the /v1/vaults explorer endpoint returns an empty list even
      # when INDEXER_REGISTRY is set.  Default to 4 (bit 2 only) so devnet
      # smoke-test runs that do not explicitly set FEATURE_FLAGS still index
      # vault-registry events and suite-10 dapp-e2e tests can see vault rows.
      # config/feature-flags.json id=2; services/explorer-indexer/src/feature_flags.rs.
      FEATURE_FLAGS: ${FEATURE_FLAGS:-4}

  explorer-api:
    build:
      context: ../../..
      dockerfile: clients/explorer-api/Dockerfile
    container_name: dapp-explorer-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-robotmoney}:${POSTGRES_PASSWORD:-robotmoney}@postgres:5432/${POSTGRES_DB:-explorer}
      EXPLORER_API_CHAIN_ID: ${EXPLORER_API_CHAIN_ID:-918453}
      EXPLORER_API_BIND: 0.0.0.0:8080
      EXPLORER_API_ALLOW_ORIGINS: ${VITE_DAPP_URL:-http://localhost:5173}
    ports:
      - "127.0.0.1:${EXPLORER_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  dapp:
    build:
      context: ../../..
      dockerfile: clients/dapp/Dockerfile
      args:
        VITE_EXPLORER_API_URL: ${VITE_EXPLORER_API_URL:-http://localhost:8080}
        VITE_DEVNET_RPC_URL: ${VITE_DEVNET_RPC_URL:-}
        VITE_GATEWAY_ADDRESS: ${VITE_GATEWAY_ADDRESS:?VITE_GATEWAY_ADDRESS must be set}
        VITE_VAULT_ADDRESS: ${VITE_VAULT_ADDRESS:?VITE_VAULT_ADDRESS must be set}
        VITE_GATEWAY_EXPECTED_CODE_HASH: ${VITE_GATEWAY_EXPECTED_CODE_HASH:?VITE_GATEWAY_EXPECTED_CODE_HASH must be set to enable admin writes}
        VITE_GATEWAY_CODE_HASH_VERIFIED: "false"
        VITE_ENV_CLASS: fork
        VITE_BROWSER_KEYGEN: "false"
        VITE_HISTORY_PANE: "true"
        # Issue #261: bake the smoke-test USDC holder key into the dapp
        # bundle so the Faucet tab and onboarding seed can drip canonical
        # USDC. Defaults to empty if the parent process did not set it
        # (e.g. ad-hoc local builds without the harness running); the
        # FaucetTab and seed handler fail closed in that case.
        VITE_FAUCET_HARNESS_PRIVATE_KEY: ${VITE_FAUCET_HARNESS_PRIVATE_KEY:-}
        # Issue #320: VaultRegistry and PortfolioRouter addresses for
        # the DestinationSelector. Default to zero address so the
        # router deposit path is hidden in standalone builds without
        # the smoke-test harness.
        VITE_REGISTRY_ADDRESS: ${VITE_REGISTRY_ADDRESS:-0x0000000000000000000000000000000000000000}
        VITE_ROUTER_ADDRESS: ${VITE_ROUTER_ADDRESS:-0x0000000000000000000000000000000000000000}
        # Issue #364: RouterGovernance address for the Governance tab.
        # Default to zero address so the governance panel shows the
        # config-missing placeholder in standalone builds.
        VITE_GOVERNANCE_ADDRESS: ${VITE_GOVERNANCE_ADDRESS:-0x0000000000000000000000000000000000000000}
        # Issue #365: RM token address for the Faucet tab 'Get RM tokens' button.
        # Default to zero address so the RM drip button is hidden in standalone
        # builds without the smoke-test harness deploying the governance+RM stack.
        VITE_RM_TOKEN_ADDRESS: ${VITE_RM_TOKEN_ADDRESS:-0x0000000000000000000000000000000000000000}
        # Issue #466: native Base ETH gas drip amount documented for parity
        # with FAUCET_DRIP_AMOUNT_ETH in clients/dapp/src/lib/chainClassifier.ts.
        # Surfaced through compose so docs/environments.md and the env-doc
        # integrity check stay consistent.
        VITE_FAUCET_DRIP_ETH_WEI: ${VITE_FAUCET_DRIP_ETH_WEI:-10000000000000000}
    container_name: dapp-frontend
    restart: unless-stopped
    depends_on:
      explorer-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DAPP_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r = await fetch('http://localhost:5173'); process.exit(r.ok ? 0 : 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
