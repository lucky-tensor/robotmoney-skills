# Full-stack containerized devnet for hosting and demos.
#
# Canonical: docs/technical/full-stack-devnet.md (runbook),
# docs/implementation-plan.md §2 (Phase 1 gateway + vault),
# §11 (Phase 5 explorer), §12 (Phase 6 dapp).
# Issue: #146.
#
# One command boots the entire Robot Money stack from a checked-in
# Anvil fork-state fixture. The fixture is generated by
# `scripts/devnet/snapshot-fork.sh` (developer-run, NOT every CI run);
# it captures Base-mainnet state at a recent block and includes the
# already-deployed Phase 1 gateway/vault/USDC contracts. CI never
# contacts an upstream RPC at runtime.
#
#   - anvil-fork        Foundry Anvil node loading the checked-in state
#                       fixture (no --fork-url at runtime).
#   - postgres          Postgres 16 for the explorer (Phase 5).
#   - explorer-indexer  services/explorer-indexer running the long-running
#                       poll loop against the fork.
#   - explorer-api      clients/explorer-api serving GET /v1/* on :8080.
#   - dapp              clients/dapp built bundle served via vite preview
#                       on :5173.
#
# The previously-required `gateway-deployer` service was removed: the
# fixture already contains the deployed contracts (the snapshot script
# ran the deploy) and a sibling `deployments/full-stack.json` records
# their addresses for the indexer.
#
# Required env vars (see .env.example):
#   POSTGRES_PASSWORD    Postgres password (any value for local devnet).
#
# Optional overrides are documented in .env.example. RMPC_FORK_RPC_URL
# is consumed only by `scripts/devnet/snapshot-fork.sh` (refresh time)
# and is irrelevant to docker-compose.

name: robotmoney-full-stack

services:
  anvil-fork:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: rm-anvil-fork
    entrypoint: ["anvil"]
    command:
      - --load-state
      - /repo/testing/fixtures/fork-state/CURRENT.anvil-state
      - --chain-id
      - ${FORK_CHAIN_ID:-8453}
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --mnemonic
      - ${ANVIL_MNEMONIC:-test test test test test test test test test test test junk}
      - --accounts
      - "10"
      - --balance
      - "10000"
    volumes:
      - .:/repo:ro
    ports:
      - "8545:8545"
    healthcheck:
      test:
        - CMD-SHELL
        - "cast chain-id --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rmoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-rmoney_explorer}
    ports:
      - "5432:5432"
    volumes:
      - rm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-rmoney}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  explorer-indexer:
    build:
      context: .
      dockerfile: services/explorer-indexer/Dockerfile
    container_name: rm-explorer-indexer
    depends_on:
      anvil-fork:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rmoney}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rmoney_explorer}
      INDEXER_RPC_URL: http://anvil-fork:8545
      INDEXER_CHAIN_ID: ${FORK_CHAIN_ID:-8453}
      INDEXER_CHAIN_NAME: ${INDEXER_CHAIN_NAME:-base-fork}
      INDEXER_RPC_LABEL: anvil-fork
      INDEXER_TICK_SECONDS: ${INDEXER_TICK_SECONDS:-12}
      INDEXER_MAX_BLOCKS_PER_TICK: ${INDEXER_MAX_BLOCKS_PER_TICK:-1000}
      RUST_LOG: info
    # Reads gateway and vault addresses from the deployment artifact written
    # by gateway-deployer (bind-mounted read-only).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -euo pipefail
        DEPLOY_FILE=/repo/deployments/full-stack.json
        if [ ! -f "$$DEPLOY_FILE" ]; then
          echo "[indexer] deployment artifact missing at $$DEPLOY_FILE" >&2
          exit 1
        fi
        # Runtime image is debian-slim without jq; parse with grep.
        export INDEXER_GATEWAY=$$(grep -o '"gateway":[[:space:]]*"0x[0-9a-fA-F]*"' "$$DEPLOY_FILE" | grep -o '0x[0-9a-fA-F]*')
        export INDEXER_VAULT=$$(grep -o '"vault":[[:space:]]*"0x[0-9a-fA-F]*"' "$$DEPLOY_FILE" | grep -o '0x[0-9a-fA-F]*')
        echo "[indexer] gateway=$$INDEXER_GATEWAY vault=$$INDEXER_VAULT"
        exec /usr/local/bin/indexer
    volumes:
      - ./deployments:/repo/deployments:ro
    restart: unless-stopped

  explorer-api:
    build:
      context: .
      dockerfile: clients/explorer-api/Dockerfile
    container_name: rm-explorer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rmoney}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rmoney_explorer}
      EXPLORER_API_BIND: 0.0.0.0:8080
      RUST_LOG: info
    ports:
      - "${EXPLORER_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  dapp:
    build:
      context: .
      dockerfile: clients/dapp/Dockerfile
      args:
        # Vite inlines these at build time. Use host-routable URLs so the
        # browser (running on the host) can reach the fork RPC and API.
        VITE_FORK_RPC_URL: ${VITE_FORK_RPC_URL:-http://localhost:8545}
        VITE_EXPLORER_API_URL: ${VITE_EXPLORER_API_URL:-http://localhost:8080}
        VITE_ENV_CLASS: ${VITE_ENV_CLASS:-fork}
        VITE_USE_MOCK_WALLET: ${VITE_USE_MOCK_WALLET:-true}
        VITE_BROWSER_KEYGEN: ${VITE_BROWSER_KEYGEN:-false}
        VITE_HISTORY_PANE: ${VITE_HISTORY_PANE:-true}
    container_name: rm-dapp
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  rm-pgdata:
    name: rm-pgdata
