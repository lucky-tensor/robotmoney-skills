# Dapp Deployment + Service.
#
# Serves the Vite-built bundle via `vite preview` on port 5173. The
# bundle hard-codes VITE_FORK_RPC_URL=http://localhost:8545 and
# VITE_EXPLORER_API_URL=http://localhost:8080 at build time so the
# browser (running on the host) reaches anvil and the explorer-api
# through the k3d-published host ports.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dapp
  namespace: robotmoney
  labels:
    app: dapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dapp
  template:
    metadata:
      labels:
        app: dapp
    spec:
      containers:
        - name: dapp
          image: rm-dapp:k3d
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dapp
  namespace: robotmoney
  labels:
    app: dapp
spec:
  type: LoadBalancer
  selector:
    app: dapp
  ports:
    - name: http
      port: 5173
      targetPort: 5173
      protocol: TCP
