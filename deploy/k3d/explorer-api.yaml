# Explorer API Deployment + Service.
#
# Serves GET /v1/* and /health on port 8080. k3d's klipper-lb publishes
# the Service to the host on the same port.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-api
  namespace: robotmoney
  labels:
    app: explorer-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explorer-api
  template:
    metadata:
      labels:
        app: explorer-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -eu
              for i in $(seq 1 60); do
                if pg_isready -h postgres -U rmoney; then exit 0; fi
                sleep 2
              done
              echo "postgres not ready" >&2; exit 1
      containers:
        - name: api
          image: rm-explorer-api:k3d
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: EXPLORER_API_BIND
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: EXPLORER_API_BIND
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: RUST_LOG
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: explorer-api
  namespace: robotmoney
  labels:
    app: explorer-api
spec:
  type: LoadBalancer
  selector:
    app: explorer-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
