# Kustomization for the full-stack k3d devnet.
#
# Validate with:
#   kubectl apply --dry-run=client -k deploy/k3d/
#
# Bring-up:
#   bash scripts/devnet/k3d-up.sh
#
# Tear-down:
#   bash scripts/devnet/k3d-down.sh
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: robotmoney

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres-secret.yaml
  - fork-rpc-secret.yaml
  - postgres.yaml
  - anvil-fork.yaml
  - gateway-deployer-job.yaml
  - explorer-indexer.yaml
  - explorer-api.yaml
  - dapp.yaml
