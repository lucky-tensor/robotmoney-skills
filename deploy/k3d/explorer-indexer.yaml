# Explorer indexer Deployment.
#
# Reads gateway/vault addresses from the `deployment-artifact` ConfigMap
# (populated by scripts/devnet/k3d-up.sh after the gateway-deployer Job
# succeeds), then runs the long-running indexer poll loop.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer-indexer
  namespace: robotmoney
  labels:
    app: explorer-indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: explorer-indexer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: explorer-indexer
    spec:
      # Wait until postgres + the deployment-artifact ConfigMap exist.
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -eu
              for i in $(seq 1 60); do
                if pg_isready -h postgres -U rmoney; then exit 0; fi
                sleep 2
              done
              echo "postgres not ready" >&2; exit 1
      containers:
        - name: indexer
          image: rm-explorer-indexer:k3d
          imagePullPolicy: IfNotPresent
          # Parse gateway+vault from the mounted deployment artifact, then
          # exec the indexer binary. Same logic as the compose service.
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              DEPLOY_FILE=/deployments/full-stack.json
              if [ ! -f "$DEPLOY_FILE" ]; then
                echo "[indexer] deployment artifact missing at $DEPLOY_FILE" >&2
                exit 1
              fi
              export INDEXER_GATEWAY=$(grep -o '"gateway":[[:space:]]*"0x[0-9a-fA-F]*"' "$DEPLOY_FILE" | grep -o '0x[0-9a-fA-F]*')
              export INDEXER_VAULT=$(grep -o '"vault":[[:space:]]*"0x[0-9a-fA-F]*"' "$DEPLOY_FILE" | grep -o '0x[0-9a-fA-F]*')
              echo "[indexer] gateway=$INDEXER_GATEWAY vault=$INDEXER_VAULT"
              exec /usr/local/bin/indexer
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          envFrom:
            - configMapRef:
                name: devnet-config
          volumeMounts:
            - name: deployment-artifact
              mountPath: /deployments
              readOnly: true
      volumes:
        - name: deployment-artifact
          configMap:
            name: deployment-artifact
            optional: false
