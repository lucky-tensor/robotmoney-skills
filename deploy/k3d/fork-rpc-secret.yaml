# Public-chain archive RPC for `anvil --fork-url`.
#
# Placeholder: the bring-up script (scripts/devnet/k3d-up.sh) overrides
# this secret at apply time with `kubectl create secret generic fork-rpc
# --from-literal=...` so the real RPC URL never lands in the manifest
# tree. This file exists so `kubectl --dry-run=client -k` is self-contained
# and so deploy-time references resolve.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: v1
kind: Secret
metadata:
  name: fork-rpc
  namespace: robotmoney
type: Opaque
stringData:
  RMPC_FORK_RPC_URL: "https://example.invalid/rpc"
  RMPC_FORK_BLOCK: "29800000"
