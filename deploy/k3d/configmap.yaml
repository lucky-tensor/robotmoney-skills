# Shared environment for all services.
#
# Mirrors the env block of docker-compose.full-stack.yaml. Values that are
# secret (postgres password) live in the `postgres-credentials` Secret
# created imperatively by scripts/devnet/k3d-up.sh. The indexer
# Deployment adds per-service envFrom entries.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: v1
kind: ConfigMap
metadata:
  name: devnet-config
  namespace: robotmoney
data:
  # Anvil fork.
  FORK_CHAIN_ID: "8453"
  ANVIL_MNEMONIC: "test test test test test test test test test test test junk"

  # Postgres connection (shared by indexer + api).
  POSTGRES_USER: "rmoney"
  POSTGRES_DB: "rmoney_explorer"

  # Indexer.
  INDEXER_RPC_URL: "http://anvil-fork:8545"
  INDEXER_CHAIN_ID: "8453"
  INDEXER_CHAIN_NAME: "base-fork"
  INDEXER_RPC_LABEL: "anvil-fork"
  INDEXER_TICK_SECONDS: "12"
  INDEXER_MAX_BLOCKS_PER_TICK: "1000"
  RUST_LOG: "info"

  # Explorer API bind.
  EXPLORER_API_BIND: "0.0.0.0:8080"

  # Foundry-test seed addresses (mnemonic indices 0..3).
  ADMIN_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  PAUSER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
  AGENT_ADDRESS: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
  SHARE_RECEIVER_ADDRESS: "0x90F79bf6EB2c4f870365E785982E1f101E93b906"
