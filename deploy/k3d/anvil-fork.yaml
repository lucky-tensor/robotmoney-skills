# Anvil fork node.
#
# Loads the checked-in fork-state fixture
# (`testing/fixtures/fork-state/CURRENT.anvil-state`) — generated by
# `scripts/devnet/snapshot-fork.sh` against Base mainnet — and exposes
# JSON-RPC on port 8545. Anvil never contacts an upstream RPC at runtime.
# k3d's klipper-lb publishes the Service to the host on the same port
# (the cluster is created with `--port 8545:8545@loadbalancer` in
# scripts/devnet/k3d-up.sh).
#
# The fixture is mounted via a ConfigMap (`fork-state`) populated by
# `scripts/devnet/k3d-up.sh` from the file checked into the repo at
# `testing/fixtures/fork-state/CURRENT.anvil-state`.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anvil-fork
  namespace: robotmoney
  labels:
    app: anvil-fork
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anvil-fork
  template:
    metadata:
      labels:
        app: anvil-fork
    spec:
      containers:
        - name: anvil
          image: ghcr.io/foundry-rs/foundry:latest
          # `foundry-rs/foundry` ships with a non-root entrypoint script.
          # Override to invoke anvil directly.
          command: ["anvil"]
          args:
            - --load-state
            - /fork-state/CURRENT.anvil-state
            - --chain-id
            - "$(FORK_CHAIN_ID)"
            - --host
            - "0.0.0.0"
            - --port
            - "8545"
            - --mnemonic
            - "$(ANVIL_MNEMONIC)"
            - --accounts
            - "10"
            - --balance
            - "10000"
          env:
            - name: FORK_CHAIN_ID
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: FORK_CHAIN_ID
            - name: ANVIL_MNEMONIC
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: ANVIL_MNEMONIC
          volumeMounts:
            - name: fork-state
              mountPath: /fork-state
              readOnly: true
          ports:
            - name: rpc
              containerPort: 8545
          readinessProbe:
            tcpSocket:
              port: 8545
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8545
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: fork-state
          configMap:
            name: fork-state
---
apiVersion: v1
kind: Service
metadata:
  name: anvil-fork
  namespace: robotmoney
  labels:
    app: anvil-fork
spec:
  type: LoadBalancer
  selector:
    app: anvil-fork
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
      protocol: TCP
