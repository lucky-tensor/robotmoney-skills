# Gateway-deployer Job — one-shot.
#
# Runs `forge script Deploy.s.sol` against the in-cluster Anvil and writes
# the deployment artifact to /repo/deployments via an emptyDir volume
# shared with the indexer (the indexer mounts the same PVC; here we use
# emptyDir so the dry-run -k validation is self-contained).
#
# Note: in this manifest, the deployer writes to a Pod-local emptyDir.
# `scripts/devnet/k3d-up.sh` reads the artifact out via `kubectl cp` and
# applies it as a ConfigMap so the indexer Deployment can consume it.
#
# Canonical: docs/technical/full-stack-devnet.md
# Issue: #146.
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-deployer
  namespace: robotmoney
  labels:
    app: gateway-deployer
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: gateway-deployer
    spec:
      restartPolicy: Never
      # Wait for anvil-fork before running. Init container polls until
      # the RPC accepts a chain_id call.
      initContainers:
        - name: wait-for-anvil
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              for i in $(seq 1 60); do
                if curl -sf -X POST -H 'content-type: application/json' \
                   --data '{"jsonrpc":"2.0","id":1,"method":"eth_chainId"}' \
                   http://anvil-fork:8545 >/dev/null; then
                  echo "anvil-fork ready"; exit 0
                fi
                sleep 2
              done
              echo "anvil-fork did not become ready" >&2; exit 1
      containers:
        - name: deployer
          image: rm-gateway-deployer:k3d
          imagePullPolicy: IfNotPresent
          workingDir: /repo
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              echo "[deployer] forge script Deploy"
              export DEPLOYMENT_OUT=/shared/full-stack.json
              mkdir -p /shared
              forge script contracts/script/Deploy.s.sol:Deploy \
                --rpc-url http://anvil-fork:8545 \
                --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
                --broadcast --slow -vvv
              echo "[deployer] deployment JSON:"
              cat "$DEPLOYMENT_OUT"
              # Stay alive briefly so `kubectl cp` can grab the artifact
              # before the Pod is reaped (ttl 600s also covers this).
              sleep 5
          env:
            - name: ADMIN_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: ADMIN_ADDRESS
            - name: PAUSER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: PAUSER_ADDRESS
            - name: AGENT_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: AGENT_ADDRESS
            - name: SHARE_RECEIVER_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: devnet-config
                  key: SHARE_RECEIVER_ADDRESS
          volumeMounts:
            - name: shared-deployments
              mountPath: /shared
      volumes:
        - name: shared-deployments
          emptyDir: {}
