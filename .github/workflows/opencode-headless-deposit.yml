# Phase 4 — Headless OpenCode deposit test (issue #137).
#
# Canonical: docs/technical/demo-runbook.md §3.2 (verbatim task prompt)
# ADR:       docs/technical/opencode-headless-invocation.md
# Implementation plan: docs/implementation-plan.md §10.
#
# Invokes OpenCode headlessly with the §3.2 verbatim deposit task prompt
# against an authorized agent on an Anvil fork. Asserts the captured
# transcript contains:
#   - Read prefix in order: get-vault, get-agent, get-balance,
#     get-allowance, self-check (all before deposit).
#   - rmpc deposit with exit 0 present in transcript.
#   - final-report.json:outcome == 'deposited', tx_hash non-null hex.
#   - No explorer API or dapp references.
#
# Fixture setup (before OpenCode is launched):
#   - Forge Deploy.s.sol deploys MockUSDC + MockVault + RobotMoneyGateway.
#   - A fresh agent EOA is generated; its keystore is written via
#     rmpc-keystore-import.
#   - Agent ETH balance is set via anvil_setBalance.
#   - Agent USDC approval is set via impersonation.
#
# Skip-cleans loudly when ANTHROPIC_API_KEY or RMPC_FORK_RPC_URL is absent.

name: opencode-headless-deposit

on:
  schedule:
    - cron: "0 4 * * *"  # nightly at 04:00 UTC
  workflow_dispatch:

# Pinned fork block — must match fork-e2e.yml and opencode-walkthrough.yml.
# Refresh monthly alongside those workflows.
env:
  RMPC_FORK_BLOCK: "23500000"
  OPENCODE_VERSION: "1.14.29"
  # Anvil default account 0 (well-known; safe for CI).
  DEPLOYER_PK: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  DEPLOYER_ADDR: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  # Deposit parameters (1 USDC = 1_000_000 with 6 decimals).
  DEPOSIT_AMOUNT: "1000000"
  MAX_FEE_BPS: "50"
  # Keystore passphrase for the ephemeral CI agent (not a production secret).
  RMPC_KEYSTORE_PASSPHRASE: "ci-headless-deposit-passphrase"

jobs:
  headless-deposit:
    name: OpenCode headless guarded deposit
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check required secrets
        id: secrets_check
        env:
          HAVE_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAVE_FORK_RPC: ${{ secrets.RMPC_FORK_RPC_URL != '' }}
        run: |
          MISSING=""
          if [ "$HAVE_ANTHROPIC_KEY" = "false" ]; then
            MISSING="$MISSING ANTHROPIC_API_KEY"
          fi
          if [ "$HAVE_FORK_RPC" = "false" ]; then
            MISSING="$MISSING RMPC_FORK_RPC_URL"
          fi
          if [ -n "$MISSING" ]; then
            echo "::warning::opencode-headless-deposit: skipping — missing secrets:$MISSING. Configure in repo settings to exercise this test."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install bun
        if: steps.secrets_check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.13"

      - name: Install OpenCode at pinned version
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          bun install -g opencode-ai@${{ env.OPENCODE_VERSION }}
          INSTALLED=$(opencode --version 2>&1)
          if [ "$INSTALLED" != "${{ env.OPENCODE_VERSION }}" ]; then
            echo "ERROR: expected ${{ env.OPENCODE_VERSION }}, got $INSTALLED"
            exit 1
          fi
          echo "opencode $INSTALLED confirmed."

      - name: Install Rust toolchain
        if: steps.secrets_check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        if: steps.secrets_check.outputs.skip != 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        if: steps.secrets_check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-headless-deposit-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-headless-deposit-

      - name: Build rmpc and rmpc-keystore-import
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          cargo build --release --bin rmpc --bin rmpc-keystore-import \
            --manifest-path clients/rust-payment-client/Cargo.toml
          echo "$GITHUB_WORKSPACE/clients/rust-payment-client/target/release" >> "$GITHUB_PATH"

      - name: Confirm rmpc is on PATH
        if: steps.secrets_check.outputs.skip != 'true'
        run: rmpc --help > /dev/null

      - name: Boot anvil fork
        if: steps.secrets_check.outputs.skip != 'true'
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: |
          anvil \
            --fork-url "$RMPC_FORK_RPC_URL" \
            --fork-block-number "$RMPC_FORK_BLOCK" \
            --chain-id 8453 \
            --port 8545 \
            --silent &
          echo "ANVIL_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf -X POST -H "Content-Type: application/json" \
                --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                http://127.0.0.1:8545 > /dev/null; then
              echo "Anvil ready after ${i}s."
              break
            fi
            sleep 1
          done

      - name: Generate ephemeral agent keypair
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          AGENT_KEY_HEX="$(openssl rand -hex 32)"
          AGENT_ADDRESS="$(cast wallet address --private-key "0x${AGENT_KEY_HEX}")"
          echo "AGENT_KEY_HEX=${AGENT_KEY_HEX}" >> "$GITHUB_ENV"
          echo "AGENT_ADDRESS=${AGENT_ADDRESS}" >> "$GITHUB_ENV"
          echo "Agent address: ${AGENT_ADDRESS}"

      - name: Deploy gateway stack via forge script
        if: steps.secrets_check.outputs.skip != 'true'
        env:
          ADMIN_ADDRESS: ${{ env.DEPLOYER_ADDR }}
          PAUSER_ADDRESS: ${{ env.DEPLOYER_ADDR }}
          SHARE_RECEIVER_ADDRESS: ${{ env.DEPLOYER_ADDR }}
          DEPLOYMENT_OUT: "./deployments/ci-deposit.json"
        run: |
          mkdir -p deployments
          forge script contracts/script/Deploy.s.sol:Deploy \
            --rpc-url http://127.0.0.1:8545 \
            --private-key "${{ env.DEPLOYER_PK }}" \
            --broadcast \
            --slow \
            -vv
          echo "Deployment output:"
          cat deployments/ci-deposit.json
          GATEWAY_ADDR="$(jq -r .gateway deployments/ci-deposit.json)"
          USDC_ADDR="$(jq -r .usdc deployments/ci-deposit.json)"
          VAULT_ADDR="$(jq -r .vault deployments/ci-deposit.json)"
          GATEWAY_HASH="$(jq -r .gateway_runtime_hash deployments/ci-deposit.json)"
          echo "GATEWAY_ADDR=${GATEWAY_ADDR}" >> "$GITHUB_ENV"
          echo "USDC_ADDR=${USDC_ADDR}" >> "$GITHUB_ENV"
          echo "VAULT_ADDR=${VAULT_ADDR}" >> "$GITHUB_ENV"
          echo "GATEWAY_HASH=${GATEWAY_HASH}" >> "$GITHUB_ENV"

      - name: Fund agent ETH and set USDC allowance
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          # Fund agent with 1 ETH for gas.
          cast rpc anvil_setBalance "$AGENT_ADDRESS" 0xDE0B6B3A7640000 \
            --rpc-url http://127.0.0.1:8545
          echo "Agent ETH funded."

          # Set USDC allowance for the gateway via impersonation.
          cast rpc anvil_impersonateAccount "$AGENT_ADDRESS" \
            --rpc-url http://127.0.0.1:8545 > /dev/null
          cast send "$USDC_ADDR" \
            "approve(address,uint256)" \
            "$GATEWAY_ADDR" "1000000000000" \
            --from "$AGENT_ADDRESS" --unlocked \
            --rpc-url http://127.0.0.1:8545 > /dev/null
          cast rpc anvil_stopImpersonatingAccount "$AGENT_ADDRESS" \
            --rpc-url http://127.0.0.1:8545 > /dev/null
          echo "USDC allowance set."

      - name: Create agent keystore
        if: steps.secrets_check.outputs.skip != 'true'
        env:
          RMPC_IMPORT_PRIVKEY_HEX: ${{ env.AGENT_KEY_HEX }}
        run: |
          rmpc-keystore-import ./agent-keystore.enc
          echo "Keystore created for agent ${AGENT_ADDRESS}."

      - name: Write rmpc-deposit.toml
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          cat > rmpc-deposit.toml <<TOML
          chain_id              = 8453
          rpc_url               = "http://127.0.0.1:8545"
          gateway_address       = "${GATEWAY_ADDR}"
          usdc_address          = "${USDC_ADDR}"
          vault_address         = "${VAULT_ADDR}"
          gateway_runtime_hash  = "${GATEWAY_HASH}"
          max_fee_per_gas_cap   = 100000000000

          [signer]
          allow_software_fallback = true
          keystore_path           = "./agent-keystore.enc"
          TOML

      - name: Run OpenCode headless deposit (§3.2 verbatim prompt)
        if: steps.secrets_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Substitute env vars into the verbatim §3.2 prompt.
          PROMPT="You are running on a Base-mainnet fork as an authorized Robot Money \
          agent. Your task is bounded and read-then-write:

          1. Read vault state via rmpc get-vault --config ./rmpc-deposit.toml and report the current \
          totalAssets and paused flag.
          2. Read your own agent authorization via rmpc get-agent --config ./rmpc-deposit.toml --address \
          ${AGENT_ADDRESS}. If not authorized, stop and produce a refusal \
          report; do not attempt a deposit.
          3. Read your forked-USDC balance and gateway allowance via \
          rmpc get-balance --config ./rmpc-deposit.toml --address ${AGENT_ADDRESS} and \
          rmpc get-allowance --config ./rmpc-deposit.toml --address ${AGENT_ADDRESS}. If the balance is below \
          ${DEPOSIT_AMOUNT} or the allowance is below ${DEPOSIT_AMOUNT}, stop \
          and produce a refusal report.
          4. Run rmpc self-check --config ./rmpc-deposit.toml. If it fails, stop and produce a refusal \
          report.
          5. If and only if all reads above pass, call rmpc deposit \
          --config ./rmpc-deposit.toml --amount ${DEPOSIT_AMOUNT} --max-fee ${MAX_FEE_BPS}. Capture the \
          returned tx hash and deposit id.
          6. Wait for the tx to mine, then call rmpc get-deposit --config ./rmpc-deposit.toml --id <id> \
          and rmpc get-tx --config ./rmpc-deposit.toml --hash <hash> and \
          rmpc get-vault --config ./rmpc-deposit.toml one more time.
          7. Produce a final report (final-report.json) with: agent address, \
          pinned block, vault totalAssets before and after, deposit id, \
          tx hash, gas used, and a one-line outcome (deposited or refused: <reason>).

          Rules:
          - Never use any explorer API. All reads go through rmpc get-* against \
          the fork RPC.
          - Never call rmpc deposit unless steps 1-4 all passed.
          - If any step fails, stop the loop and emit the refusal report. \
          Do not retry, do not escalate, do not call any other tool.
          - You must complete or refuse within 10 minutes wall-clock."

          opencode run "$PROMPT" \
            --format json \
            --model anthropic/claude-sonnet-4-5 \
            --dangerously-skip-permissions \
            > transcript.ndjson \
            2> opencode-stderr.log \
            || true
          echo "opencode run exited $?"
          echo "transcript lines: $(wc -l < transcript.ndjson)"

      - name: Assert transcript
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          python3 .github/scripts/assert_headless_deposit_transcript.py \
            transcript.ndjson \
            --final-report final-report.json

      - name: Upload artifacts on failure
        if: failure() && steps.secrets_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: headless-deposit-artifacts
          path: |
            transcript.ndjson
            opencode-stderr.log
            final-report.json
            deployments/ci-deposit.json

      - name: Tear down anvil
        if: always() && steps.secrets_check.outputs.skip != 'true' && env.ANVIL_PID != ''
        run: kill "$ANVIL_PID" 2>/dev/null || true

      - name: Summary
        if: steps.secrets_check.outputs.skip != 'true'
        run: |
          echo "### opencode-headless-deposit — PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- OpenCode ${{ env.OPENCODE_VERSION }} drove rmpc read prefix then deposit headlessly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Transcript asserted: read prefix order, deposit exit 0, outcome deposited, no explorer references" >> "$GITHUB_STEP_SUMMARY"
