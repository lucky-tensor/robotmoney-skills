name: e2e-rust harness

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/ethereum-testnet/e2e-rust/**"
      - "clients/rust-payment-daemon/**"
      - "contracts/**"
      - "foundry.toml"
      - ".github/workflows/e2e-rust-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/ethereum-testnet/e2e-rust/**"
      - "clients/rust-payment-daemon/**"
      - "contracts/**"
      - "foundry.toml"
      - ".github/workflows/e2e-rust-ci.yml"
  workflow_dispatch:

jobs:
  anvil-smoke:
    name: Anvil-flavor smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('clients/rust-payment-daemon/Cargo.toml', 'testing/ethereum-testnet/e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: rmpd fmt + clippy
        working-directory: clients/rust-payment-daemon
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: e2e-rust fmt + clippy
        working-directory: testing/ethereum-testnet/e2e-rust
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build rmpd binary
        run: |
          cargo build --release --manifest-path clients/rust-payment-daemon/Cargo.toml --bin rmpd

      - name: Anvil smoke test
        working-directory: testing/ethereum-testnet/e2e-rust
        run: cargo test --test anvil_smoke -- --nocapture
