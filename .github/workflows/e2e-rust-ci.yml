name: e2e-rust harness

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/ethereum-testnet/e2e-rust/**"
      - "clients/rust-payment-client/**"
      - "contracts/**"
      - "foundry.toml"
      - ".github/workflows/e2e-rust-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/ethereum-testnet/e2e-rust/**"
      - "clients/rust-payment-client/**"
      - "contracts/**"
      - "foundry.toml"
      - ".github/workflows/e2e-rust-ci.yml"
  workflow_dispatch:

jobs:
  anvil-smoke:
    name: Anvil-flavor smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('clients/rust-payment-client/Cargo.toml', 'testing/ethereum-testnet/e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: rmpc fmt + clippy
        working-directory: clients/rust-payment-client
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: e2e-rust fmt + clippy
        working-directory: testing/ethereum-testnet/e2e-rust
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build rmpc binary
        run: |
          cargo build --release --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Anvil smoke test
        working-directory: testing/ethereum-testnet/e2e-rust
        run: cargo test --test anvil_smoke -- --nocapture

  geth-tests:
    name: Geth+Lighthouse-flavor scenario tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Docker is available
        run: |
          docker version
          docker compose version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-geth-${{ hashFiles('clients/rust-payment-client/Cargo.toml', 'testing/ethereum-testnet/e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-geth-
            ${{ runner.os }}-cargo-e2e-

      - name: Pre-pull Docker images
        working-directory: testing/ethereum-testnet/config
        run: docker compose pull --ignore-pull-failures || true

      - name: Build rmpc binary
        run: |
          cargo build --release --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Geth scenario tests
        working-directory: testing/ethereum-testnet/e2e-rust
        env:
          RMPC_E2E_GETH: "1"
        run: cargo test --release --test geth -- --test-threads=1 --nocapture

      - name: Tear down docker on failure
        if: always()
        working-directory: testing/ethereum-testnet/config
        run: docker compose down -v --remove-orphans || true
