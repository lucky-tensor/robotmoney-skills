# Phase 4 — OpenCode walkthrough automated checks (issue #53).
#
# Canonical: docs/walkthroughs/opencode-readonly-fork.md
# Implementation plan: docs/implementation-plan.md §10.
#
# - `offline-checks` runs three hermetic tests (no secrets required).
# - `check-fork-rpc` gates `fork-check` on RMPC_FORK_RPC_URL presence;
#   when absent fork-check is marked SKIPPED (not passed).

name: opencode-walkthrough

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/opencode-walkthrough/**"
      - "docs/walkthroughs/opencode-readonly-fork.md"
      - "plugins/robotmoney-cli/**"
      - "clients/rust-payment-client/**"
      - ".github/workflows/opencode-walkthrough.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/opencode-walkthrough/**"
      - "docs/walkthroughs/opencode-readonly-fork.md"
      - "plugins/robotmoney-cli/**"
      - "clients/rust-payment-client/**"
      - ".github/workflows/opencode-walkthrough.yml"
  workflow_dispatch:

# Pinned fork block — must match fork-e2e.yml. Refresh monthly via a chore PR.
env:
  RMPC_FORK_BLOCK: "23500000"

jobs:
  offline-checks:
    name: Walkthrough parity + config + refusal (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            testing/opencode-walkthrough/target
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-opencode-walkthrough-${{ hashFiles('testing/opencode-walkthrough/Cargo.toml', 'clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-opencode-walkthrough-

      - name: fmt + clippy
        working-directory: testing/opencode-walkthrough
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build offline tests
        working-directory: testing/opencode-walkthrough
        run: cargo test --no-run

      - name: Run offline tests
        working-directory: testing/opencode-walkthrough
        run: |
          cargo test --test walkthrough_parity -- --nocapture
          cargo test --test config_template_parses -- --nocapture
          cargo test --test refusal_walkthrough -- --nocapture

  check-fork-rpc:
    name: Check RMPC_FORK_RPC_URL
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - name: Verify secret present
        id: check
        env:
          HAS_FORK_RPC: ${{ secrets.RMPC_FORK_RPC_URL != '' }}
        run: |
          if [ "$HAS_FORK_RPC" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::RMPC_FORK_RPC_URL not configured — fork-check will be skipped"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  fork-check:
    name: Walkthrough fork inspection (anvil-fork)
    needs: check-fork-rpc
    if: needs.check-fork-rpc.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            testing/opencode-walkthrough/target
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-opencode-walkthrough-${{ hashFiles('testing/opencode-walkthrough/Cargo.toml', 'clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-opencode-walkthrough-

      - name: Run fork inspection
        working-directory: testing/opencode-walkthrough
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: cargo test --test read_only_walkthrough -- --nocapture
