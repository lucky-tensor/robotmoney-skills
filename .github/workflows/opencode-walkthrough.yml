# Phase 4 — OpenCode walkthrough automated checks (issue #53).
#
# Canonical: docs/walkthroughs/opencode-readonly-fork.md
# Implementation plan: docs/implementation-plan.md §10.
# Fixes: issue #107 (fork block pin, get-gateway test, deeper assertions,
#        fmt/clippy).
#
# The crate at testing/opencode-walkthrough/ owns the test pyramid for
# the walkthrough doc:
#
# - Three offline tests (`walkthrough_parity`, `config_template_parses`,
#   `refusal_walkthrough`) need only the rmpc binary; they run on every
#   PR. fmt + clippy also run in this job.
# - Two online tests (`read_only_walkthrough`) boot anvil-fork against
#   `RMPC_FORK_RPC_URL` pinned to `RMPC_FORK_BLOCK` and assert the rmpc
#   envelope + data contracts. They skip-clean when the secret is unset.

name: opencode-walkthrough

# Pinned fork block per fork-e2e ADR §3.2. Refresh monthly alongside
# fork-e2e.yml; the bump must be visible in PR diff.
env:
  RMPC_FORK_BLOCK: "23500000"

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/opencode-walkthrough/**"
      - "docs/walkthroughs/opencode-readonly-fork.md"
      - "plugins/robotmoney-cli/**"
      - "clients/rust-payment-client/**"
      - ".github/workflows/opencode-walkthrough.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/opencode-walkthrough/**"
      - "docs/walkthroughs/opencode-readonly-fork.md"
      - "plugins/robotmoney-cli/**"
      - "clients/rust-payment-client/**"
      - ".github/workflows/opencode-walkthrough.yml"
  workflow_dispatch:

jobs:
  offline-checks:
    name: Walkthrough parity + config + refusal (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            testing/opencode-walkthrough/target
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-opencode-walkthrough-${{ hashFiles('testing/opencode-walkthrough/Cargo.toml', 'clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-opencode-walkthrough-

      - name: fmt + clippy
        working-directory: testing/opencode-walkthrough
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build offline tests
        working-directory: testing/opencode-walkthrough
        run: cargo test --no-run

      - name: Run offline tests
        working-directory: testing/opencode-walkthrough
        run: |
          cargo test --test walkthrough_parity -- --nocapture
          cargo test --test config_template_parses -- --nocapture
          cargo test --test refusal_walkthrough -- --nocapture

  fork-check:
    name: Walkthrough fork inspection (anvil-fork)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            testing/opencode-walkthrough/target
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-opencode-walkthrough-${{ hashFiles('testing/opencode-walkthrough/Cargo.toml', 'clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-opencode-walkthrough-

      - name: Run fork inspection (skip-cleans without RMPC_FORK_RPC_URL)
        working-directory: testing/opencode-walkthrough
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
          RMPC_FORK_BLOCK: ${{ env.RMPC_FORK_BLOCK }}
        run: |
          if [ -z "$RMPC_FORK_RPC_URL" ]; then
            echo "::warning::RMPC_FORK_RPC_URL secret not configured; the fork tests will skip-clean. Set the secret in repo settings to actually exercise the fork."
          fi
          cargo test --test read_only_walkthrough -- --nocapture
