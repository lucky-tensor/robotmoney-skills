# Phase 2 — Forked Smart-Contract E2E.
#
# Canonical: docs/implementation-plan.md §8.
# Decision record: docs/technical/fork-e2e-decisions.md (issue #47).
# Implements: issue #48.
#
# Two jobs:
#
# - `pr-smoke` runs the §8 PR-time subset (`abi_address_sanity` +
#   `vault_deposit_redeem_smoke`) on every PR and on push to dev/main.
# - `full-suite` runs the remaining three §8 scenarios, plus the
#   PR-time pair, on workflow_dispatch and on push to main (post-merge).
#
# The fork RPC URL must be configured as a repository secret named
# `RMPC_FORK_RPC_URL`. Without it the harness exits 0 with a printed
# skip line, so a missing-secret state is loud but non-blocking.

name: fork-e2e

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/fork-e2e-rust/**"
      - ".github/workflows/fork-e2e.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/fork-e2e-rust/**"
      - ".github/workflows/fork-e2e.yml"
  workflow_dispatch:

# Pinned fork block per ADR §3.2. Refresh monthly via a chore PR;
# the bump must be visible in PR diff so a maintainer can review the
# pin change before it lands in CI.
env:
  RMPC_FORK_BLOCK: "23500000"

jobs:
  # Issue #146 — every multi-service E2E workflow proves the migrated
  # k3d devnet brings the stack up before the per-workflow assertions
  # run. The reusable workflow boots the cluster on its own runner and
  # smoke-tests reachability; it skip-cleans when RMPC_FORK_RPC_URL is
  # absent so PR runs that lack the secret stay green.
  devnet-up:
    name: Reusable k3d devnet boot
    uses: ./.github/workflows/_devnet-k3d.yml
    secrets:
      RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
    with:
      fork-block: "23500000"

  pr-smoke:
    name: Fork PR-smoke (abi_address_sanity + vault_deposit_redeem_smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fork-e2e-${{ hashFiles('testing/fork-e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fork-e2e-

      - name: fmt + clippy
        working-directory: testing/fork-e2e-rust
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build tests
        working-directory: testing/fork-e2e-rust
        run: cargo test --no-run

      - name: PR-smoke scenarios
        working-directory: testing/fork-e2e-rust
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: |
          if [ -z "$RMPC_FORK_RPC_URL" ]; then
            echo "::warning::RMPC_FORK_RPC_URL secret not configured; tests will skip-clean. Set the secret in repo settings to actually exercise the fork."
          fi
          cargo test --test abi_address_sanity --test vault_deposit_redeem_smoke -- --nocapture

  full-suite:
    name: Fork full suite (all 5 §8 scenarios)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fork-e2e-${{ hashFiles('testing/fork-e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fork-e2e-

      - name: Build tests
        working-directory: testing/fork-e2e-rust
        run: cargo test --no-run

      - name: Full §8 suite
        working-directory: testing/fork-e2e-rust
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: |
          if [ -z "$RMPC_FORK_RPC_URL" ]; then
            echo "::warning::RMPC_FORK_RPC_URL secret not configured; tests will skip-clean."
          fi
          cargo test -- --nocapture --test-threads=2
