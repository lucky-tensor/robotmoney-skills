# Phase 4 — Headless OpenCode vault read test (issue #136).
#
# Canonical: docs/walkthroughs/opencode-readonly-fork.md (step 5)
# ADR:       docs/technical/opencode-headless-invocation.md
# Implementation plan: docs/implementation-plan.md §10.
#
# Boots a fresh local anvil node (no fork, no RMPC_FORK_RPC_URL).
# Deploys MockUSDC + MockVault + RobotMoneyGateway, then drives OpenCode
# headlessly to read vault state via rmpc get-vault and get-gateway.
# Only ANTHROPIC_API_KEY is required. When absent check-secrets outputs
# ok=false and headless-read is marked SKIPPED (not passed).
#
# Asserts the captured transcript contains:
#   - rmpc get-vault with exit 0 and valid JSON envelope
#     (chain_id, block_number, source).
#   - rmpc get-gateway with exit 0 and partial: true.
#   - No reference to explorer APIs or the dapp.

name: opencode-headless-read

on:
  schedule:
    - cron: "0 3 * * *"  # nightly at 03:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    paths:
      - "clients/rust-payment-client/**"
      - "contracts/**"
      - "plugins/robotmoney-cli/**"
      - ".github/workflows/opencode-headless-read.yml"
      - ".github/scripts/assert_headless_read_transcript.py"

env:
  OPENCODE_VERSION: "1.14.29"
  DEPLOYER_PK:   "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  DEPLOYER_ADDR: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"

jobs:
  check-secrets:
    name: Check required secrets
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - name: Verify secrets present
        id: check
        env:
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_ANTHROPIC" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::opencode-headless-read: ANTHROPIC_API_KEY not configured — job will be skipped"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  headless-read:
    name: OpenCode headless vault read
    needs: check-secrets
    if: needs.check-secrets.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.13"

      - name: Install OpenCode at pinned version
        run: |
          bun install -g opencode-ai@${{ env.OPENCODE_VERSION }}
          INSTALLED=$(opencode --version 2>&1)
          if [ "$INSTALLED" != "${{ env.OPENCODE_VERSION }}" ]; then
            echo "ERROR: expected ${{ env.OPENCODE_VERSION }}, got $INSTALLED"
            exit 1
          fi
          echo "opencode $INSTALLED confirmed."

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-headless-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-headless-

      - name: Build rmpc
        run: |
          cargo build --release --bin rmpc \
            --manifest-path clients/rust-payment-client/Cargo.toml
          echo "$GITHUB_WORKSPACE/clients/rust-payment-client/target/release" >> "$GITHUB_PATH"

      - name: Confirm rmpc is on PATH
        run: rmpc --help > /dev/null

      - name: Boot local anvil
        run: |
          anvil --chain-id 8453 --port 8545 --silent &
          echo "ANVIL_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 15); do
            if curl -sf -X POST -H "Content-Type: application/json" \
                --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                http://127.0.0.1:8545 > /dev/null; then
              echo "Anvil ready after ${i}s."
              break
            fi
            sleep 1
          done

      - name: Deploy mock contracts
        env:
          ADMIN_ADDRESS:          ${{ env.DEPLOYER_ADDR }}
          PAUSER_ADDRESS:         ${{ env.DEPLOYER_ADDR }}
          AGENT_ADDRESS:          ${{ env.DEPLOYER_ADDR }}
          SHARE_RECEIVER_ADDRESS: ${{ env.DEPLOYER_ADDR }}
          DEPLOYMENT_OUT: "./deployments/ci-headless-read.json"
        run: |
          mkdir -p deployments
          forge script contracts/script/Deploy.s.sol:Deploy \
            --rpc-url http://127.0.0.1:8545 \
            --private-key "$DEPLOYER_PK" \
            --broadcast \
            --slow \
            -vv
          cat deployments/ci-headless-read.json
          echo "GATEWAY_ADDR=$(jq -r .gateway              deployments/ci-headless-read.json)" >> "$GITHUB_ENV"
          echo "USDC_ADDR=$(jq -r    .usdc                 deployments/ci-headless-read.json)" >> "$GITHUB_ENV"
          echo "VAULT_ADDR=$(jq -r   .vault                deployments/ci-headless-read.json)" >> "$GITHUB_ENV"
          echo "GATEWAY_HASH=$(jq -r .gateway_runtime_hash deployments/ci-headless-read.json)" >> "$GITHUB_ENV"

      - name: Write rmpc-read.toml
        run: |
          cat > rmpc-read.toml <<TOML
          chain_id              = 8453
          rpc_url               = "http://127.0.0.1:8545"
          gateway_address       = "${GATEWAY_ADDR}"
          usdc_address          = "${USDC_ADDR}"
          vault_address         = "${VAULT_ADDR}"
          gateway_runtime_hash  = "${GATEWAY_HASH}"
          max_fee_per_gas_cap   = 100000000000

          [signer]
          allow_software_fallback = true
          keystore_path           = "./keystore.json"
          TOML

      - name: Run OpenCode headless read (step-5 prompt)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          opencode run \
            "Using the robotmoney-cli skill, inspect the Robot Money vault on the configured local devnet. Run get-vault and get-gateway with --config ./rmpc-read.toml --pretty. Do not propose any writes; this is a read-only inspection." \
            --format json \
            --model anthropic/claude-sonnet-4-5 \
            --dangerously-skip-permissions \
            > transcript.ndjson \
            2> opencode-stderr.log \
            || true
          echo "opencode run exited $?"
          echo "transcript lines: $(wc -l < transcript.ndjson)"

      - name: Assert transcript
        run: |
          python3 .github/scripts/assert_headless_read_transcript.py transcript.ndjson

      - name: Upload transcript on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headless-read-transcript
          path: |
            transcript.ndjson
            opencode-stderr.log

      - name: Tear down anvil
        if: always() && env.ANVIL_PID != ''
        run: kill "$ANVIL_PID" 2>/dev/null || true

      - name: Summary
        run: |
          echo "### opencode-headless-read — PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- OpenCode ${{ env.OPENCODE_VERSION }} drove rmpc get-vault and rmpc get-gateway headlessly" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local devnet (no fork, no RMPC_FORK_RPC_URL)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Transcript asserted: valid JSON envelope, partial: true on get-gateway, no explorer references" >> "$GITHUB_STEP_SUMMARY"
