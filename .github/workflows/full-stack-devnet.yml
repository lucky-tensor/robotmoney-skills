# Issue: #146 — full-stack containerized devnet.
#
# Canonical: docs/technical/full-stack-devnet.md.
#
# Two milestones share this workflow:
#
#   - compose-validate / build-images: hermetic smoke for
#     docker-compose.full-stack.yaml on every PR.
#   - manifest-validate: kustomize render of deploy/k3d/ on every PR.
#   - k3d-smoke: schedule + workflow_dispatch only — boots the live k3d
#     devnet, submits an AgentDeposit, asserts the explorer indexes it,
#     then asserts a clean tear-down. Requires RMPC_FORK_RPC_URL.

name: full-stack-devnet

on:
  push:
    branches: [main, dev]
    paths:
      - "docker-compose.full-stack.yaml"
      - ".env.example"
      - "services/explorer-indexer/Dockerfile"
      - "clients/explorer-api/Dockerfile"
      - "clients/dapp/Dockerfile"
      - "deploy/k3d/**"
      - "scripts/devnet/**"
      - "docs/technical/full-stack-devnet.md"
      - ".github/workflows/full-stack-devnet.yml"
      - ".github/workflows/_devnet-k3d.yml"
      - ".github/actions/devnet-k3d/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "docker-compose.full-stack.yaml"
      - ".env.example"
      - "services/explorer-indexer/Dockerfile"
      - "clients/explorer-api/Dockerfile"
      - "clients/dapp/Dockerfile"
      - "deploy/k3d/**"
      - "scripts/devnet/**"
      - "docs/technical/full-stack-devnet.md"
      - ".github/workflows/full-stack-devnet.yml"
      - ".github/workflows/_devnet-k3d.yml"
      - ".github/actions/devnet-k3d/**"
  schedule:
    - cron: "37 5 * * *"  # nightly k3d-smoke
  workflow_dispatch:

jobs:
  compose-validate:
    name: Validate compose graph
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config (with placeholder env)
        env:
          RMPC_FORK_RPC_URL: https://example.invalid/rpc
          RMPC_FORK_BLOCK: "29800000"
          POSTGRES_PASSWORD: smoke
        run: |
          docker compose -f docker-compose.full-stack.yaml config > /tmp/compose.rendered.yaml
          # Sanity: every expected service is present.
          for svc in anvil-fork gateway-deployer postgres explorer-indexer explorer-api dapp; do
            if ! grep -qE "^[[:space:]]+${svc}:" /tmp/compose.rendered.yaml; then
              echo "missing service: $svc" >&2
              exit 1
            fi
          done
          # Sanity: required ports are mapped. `docker compose config`
          # expands short port syntax into structured `published:` blocks.
          for port in 8545 5432 5173; do
            if ! grep -qE "published:[[:space:]]*\"?${port}\"?" /tmp/compose.rendered.yaml; then
              echo "missing host port: $port" >&2
              exit 1
            fi
          done

      - name: env-example covers every required variable
        run: |
          set -euo pipefail
          for var in RMPC_FORK_RPC_URL RMPC_FORK_BLOCK FORK_CHAIN_ID \
                    ANVIL_MNEMONIC \
                    POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB \
                    INDEXER_CHAIN_NAME INDEXER_TICK_SECONDS INDEXER_MAX_BLOCKS_PER_TICK \
                    EXPLORER_API_PORT \
                    VITE_FORK_RPC_URL VITE_EXPLORER_API_URL VITE_ENV_CLASS \
                    VITE_USE_MOCK_WALLET VITE_BROWSER_KEYGEN VITE_HISTORY_PANE; do
            if ! grep -qE "^${var}=" .env.example; then
              echo ".env.example missing: $var" >&2
              exit 1
            fi
          done

  build-images:
    name: Build full-stack images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build explorer-indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/explorer-indexer/Dockerfile
          push: false
          tags: rm-explorer-indexer:smoke

      - name: Build explorer-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: clients/explorer-api/Dockerfile
          push: false
          tags: rm-explorer-api:smoke

      - name: Build dapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: clients/dapp/Dockerfile
          push: false
          tags: rm-dapp:smoke

  # ── k3d milestone ──────────────────────────────────────────────────────
  manifest-validate:
    name: Validate k3d manifests (kustomize)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: kustomize render
        # `kubectl kustomize` validates structure offline (no API server).
        # Equivalent to `kubectl apply --dry-run=client -k` once a context
        # is available; we use `kustomize` so the check is hermetic.
        run: |
          kubectl kustomize deploy/k3d/ > /tmp/manifests.yaml
          test -s /tmp/manifests.yaml
          echo "Rendered $(grep -c '^---' /tmp/manifests.yaml) documents"

      - name: Sanity — every expected resource is present
        run: |
          set -euo pipefail
          for kind_name in \
            "Namespace/robotmoney" \
            "Service/anvil-fork" \
            "Service/postgres" \
            "Service/explorer-api" \
            "Service/dapp" \
            "Deployment/anvil-fork" \
            "Deployment/postgres" \
            "Deployment/explorer-indexer" \
            "Deployment/explorer-api" \
            "Deployment/dapp" \
            "Job/gateway-deployer"; do
            kind="${kind_name%%/*}"; name="${kind_name##*/}"
            if ! awk -v k="$kind" -v n="$name" '
              /^kind:/ {kind=$2}
              /^[[:space:]]+name:/ && kind==k {if ($2==n) {found=1; exit}}
              END {exit found?0:1}
            ' /tmp/manifests.yaml; then
              echo "missing $kind/$name" >&2
              exit 1
            fi
          done
          # Required host port surface.
          for port in 8545 5432 8080 5173; do
            if ! grep -qE "port:[[:space:]]*${port}\b" /tmp/manifests.yaml; then
              echo "missing service port: $port" >&2
              exit 1
            fi
          done

  k3d-smoke:
    name: k3d devnet smoke (up → AgentDeposit → indexed → down)
    # Live cluster boot requires a real archive RPC; skip on PR by
    # default. Runs nightly + on workflow_dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: [compose-validate, manifest-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip-clean if RMPC_FORK_RPC_URL absent
        id: secret_check
        env:
          HAVE_FORK_RPC: ${{ secrets.RMPC_FORK_RPC_URL != '' }}
        run: |
          if [ "$HAVE_FORK_RPC" != "true" ]; then
            echo "::warning::k3d-smoke: RMPC_FORK_RPC_URL absent; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Foundry
        if: steps.secret_check.outputs.skip != 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Bring up devnet
        if: steps.secret_check.outputs.skip != 'true'
        uses: ./.github/actions/devnet-k3d
        with:
          fork-rpc-url: ${{ secrets.RMPC_FORK_RPC_URL }}
          fork-block: "29800000"
          chain-id: "8453"

      - name: Verify reachability + AgentDeposit round-trip
        if: steps.secret_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # health + dapp reachable
          curl -fsS http://127.0.0.1:8080/health
          curl -fsS -o /dev/null http://127.0.0.1:5173/

          # Read deployment artifact persisted by k3d-up.sh.
          GATEWAY=$(grep -o '"gateway":[[:space:]]*"0x[0-9a-fA-F]*"' deployments/full-stack.json | grep -o '0x[0-9a-fA-F]*')
          USDC=$(grep -o '"usdc":[[:space:]]*"0x[0-9a-fA-F]*"' deployments/full-stack.json | grep -o '0x[0-9a-fA-F]*')
          # Foundry mnemonic index 2 — matches Deploy.s.sol's AGENT_ADDRESS default.
          AGENT="0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
          AGENT_PK="0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"

          echo "[smoke] gateway=$GATEWAY usdc=$USDC agent=$AGENT"

          # 1. Approve the gateway to pull USDC.
          cast send "$USDC" "approve(address,uint256)" "$GATEWAY" "1000000000000" \
            --rpc-url http://127.0.0.1:8545 --private-key "$AGENT_PK"

          # 2. Snapshot deposit count BEFORE.
          BEFORE_BODY=$(curl -sf "http://127.0.0.1:8080/v1/agents/$AGENT/deposits" || echo "[]")
          BEFORE_LEN=$(printf '%s' "$BEFORE_BODY" | tr -d '[:space:]' | wc -c)
          echo "[smoke] deposits before: $BEFORE_BODY"

          # 3. AgentDeposit via the gateway's `deposit(bytes32,uint256,uint64,bytes32)`.
          ORDER_ID=$(cast keccak "smoke-$(date +%s)")
          IDEM_KEY=$(cast keccak "idem-$(date +%s)")
          DEADLINE=$(($(date +%s) + 600))
          cast send "$GATEWAY" \
            "deposit(bytes32,uint256,uint64,bytes32)" \
            "$ORDER_ID" 1000000 "$DEADLINE" "$IDEM_KEY" \
            --rpc-url http://127.0.0.1:8545 --private-key "$AGENT_PK"

          # 4. Poll the explorer for the indexed event (one tick = 12s default).
          for i in $(seq 1 45); do
            CUR_BODY=$(curl -sf "http://127.0.0.1:8080/v1/agents/$AGENT/deposits" || echo "[]")
            CUR_LEN=$(printf '%s' "$CUR_BODY" | tr -d '[:space:]' | wc -c)
            if [ "$CUR_LEN" -gt "$BEFORE_LEN" ]; then
              echo "[smoke] explorer indexed AgentDeposit after ${i} polls"
              echo "[smoke] deposits after: $CUR_BODY"
              exit 0
            fi
            sleep 2
          done
          echo "[smoke] explorer did not index the deposit within 90s" >&2
          curl -sf "http://127.0.0.1:8080/v1/agents/$AGENT/deposits" || true
          kubectl -n robotmoney logs deployment/explorer-indexer --tail=100 || true
          exit 1

      - name: Tear down + idempotent re-up assertion
        if: steps.secret_check.outputs.skip != 'true'
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
          RMPC_FORK_BLOCK: "29800000"
        run: |
          set -euo pipefail
          # 1. Down — must succeed.
          bash scripts/devnet/k3d-down.sh
          # 2. Down again — must report nothing to do (idempotent).
          out=$(bash scripts/devnet/k3d-down.sh 2>&1); echo "$out"
          echo "$out" | grep -q "nothing to do"
          # 3. Up again — must succeed (idempotent up after a clean
          #    tear-down). Quick re-up is enough; we don't re-run the
          #    AgentDeposit assertion here.
          bash scripts/devnet/k3d-up.sh
          curl -fsS http://127.0.0.1:8080/health

      - name: Final tear-down (always)
        if: always() && steps.secret_check.outputs.skip != 'true'
        run: bash scripts/devnet/k3d-down.sh || true
