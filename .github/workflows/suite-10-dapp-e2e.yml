# Canonical: docs/development/ci-suites.md §10
#
# WHY THIS SUITE EXISTS
# The dApp's primary user-facing flows — connect wallet, render verified state,
# preview authorize/revoke/pause/unpause/grant calldata, surface the history
# pane — are tested end-to-end through a real Chromium against a real
# Geth+Lighthouse devnet with the gateway, vault, and explorer indexer all
# deployed. Type-checking (suite 9) does not prove these flows work.
#
# WHY ONE JOB
# Every spec runs against the same smoke-test full-stack devnet, booted by
# Playwright globalSetup. There is no "fast" local-dev variant — the dapp
# bundle is built bit-identically to a production deployment, with the
# gateway runtime code hash pinned at build time. The principle:
# **no test-only code lands in production**. See docs/development/smoke-test-design.md.
#
# WHY PLAYWRIGHT REPORT IS UPLOADED ON FAILURE
# Screenshots + traces are needed to diagnose flaky browser-side failures.
# Without the report a CI failure is often just a stack trace.

name: dapp-e2e

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    paths:
      - "clients/dapp/**"
      - "contracts/**"
      - "testing/smoke-test/**"
      - "testing/ethereum-testnet/**"
      - ".github/workflows/suite-10-dapp-e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: dapp-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: clients/dapp
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Docker is available
        run: |
          docker version
          docker compose version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/target
          key: ${{ runner.os }}-cargo-dapp-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dapp-e2e-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-build smoke-test binary
        # Build the binary before the Playwright BOOT_TIMEOUT_MS countdown starts.
        # globalSetup re-runs `cargo run` which reuses the compiled artefacts here.
        run: cargo build -p smoke-test
        working-directory: ${{ github.workspace }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright (boots smoke-test full-stack devnet via globalSetup)
        env:
          SMOKE_TEST_LOG_FILE: ${{ runner.temp }}/robotmoney-smoke-test/smoke-test-suite-10.log
          PLAYWRIGHT_HTML_REPORT: ${{ runner.temp }}/robotmoney-playwright/report
          PLAYWRIGHT_OUTPUT_DIR: ${{ runner.temp }}/robotmoney-playwright/test-results
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ runner.temp }}/robotmoney-playwright/report/

      - name: Upload smoke-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: ${{ runner.temp }}/robotmoney-smoke-test/smoke-test-suite-10.log*
