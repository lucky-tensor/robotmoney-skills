name: Ethereum Test Harness Smoke Test

on:
  push:
    branches: [main]
    paths:
      - "testing/ethereum-testnet/**"
      - ".github/workflows/eth-harness-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "testing/ethereum-testnet/**"
      - ".github/workflows/eth-harness-ci.yaml"
  workflow_dispatch:

jobs:
  smoke-test:
    name: Real-network smoke test (no mocks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker is available
        run: |
          docker version
          docker compose version

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('testing/ethereum-testnet/typescript-sdk/bun.lock', 'testing/ethereum-testnet/typescript-sdk/bun.lockb', 'testing/ethereum-testnet/typescript-sdk/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            testing/ethereum-testnet/contracts/cache
            testing/ethereum-testnet/contracts/out
          key: ${{ runner.os }}-foundry-${{ hashFiles('testing/ethereum-testnet/contracts/**/*.sol', 'testing/ethereum-testnet/contracts/foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Install TypeScript SDK dependencies
        working-directory: testing/ethereum-testnet/typescript-sdk
        run: bun install --frozen-lockfile || bun install

      - name: Build Solidity contracts
        working-directory: testing/ethereum-testnet/contracts
        run: forge build

      - name: Pre-pull Docker images
        working-directory: testing/ethereum-testnet/config
        run: docker compose pull --ignore-pull-failures || true

      - name: Run minimal-deployment smoke test (real PoS docker network)
        working-directory: testing/ethereum-testnet/typescript-sdk
        run: bun test test/minimal-deployment.test.ts --timeout 600000

      - name: Tear down docker on failure
        if: failure()
        working-directory: testing/ethereum-testnet/config
        run: |
          docker compose down -v --remove-orphans || true
          docker ps -a --filter "name=eth-" --format '{{.Names}}' | xargs -r docker rm -f || true

      - name: Dump docker logs on failure
        if: failure()
        working-directory: testing/ethereum-testnet/config
        run: |
          docker compose logs --no-color --tail=300 || true
