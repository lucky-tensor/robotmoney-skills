# Canonical: docs/testing/ci-suites.md §5
#
# WHY THIS SUITE EXISTS
# The Rust client (rmpc) contains protocol adapter code that must correctly encode
# calldata for the live RobotMoneyGateway ABI and handle real-world RPC error shapes.
# Unit tests (suite 6) mock the chain; only a fork test proves the ABI encoding,
# address constants, and error handling work against the contract as deployed on
# mainnet. This suite is the line of defence between a refactor breaking a live
# integration and that breakage reaching users.
#
# WHY THE JOB SPLITS ON TRIGGER TYPE (pr-smoke vs full-suite)
# The full fork suite takes ~20 minutes. Running it on every PR would add that cost to
# every contributor's feedback loop. The PR smoke covers the highest-signal tests
# (ABI sanity + basic deposit/redeem round-trip); regressions in the rarer scenarios
# (dex routing, failure surfaces) are caught on push to main where the cost is paid
# once per merged commit.
#
# WHY NO RMPC_FORK_RPC_URL SECRET
# The fork state is loaded from a checked-in fixture (testing/fixtures/fork-state/).
# No upstream RPC is contacted at runtime. The fixture is refreshed offline with
# scripts/devnet/snapshot-fork.sh when the mainnet state it depends on changes.
# This eliminates flakiness from external RPC rate limits and makes the suite
# fully hermetic.
#
# GOTCHAS
# - If the fork fixture is stale (e.g. a contract was upgraded on mainnet), tests will
#   fail with ABI mismatch errors that look like encoding bugs. Check the fixture age
#   and re-run snapshot-fork.sh before debugging the test code.
# - cargo test --no-run is a separate step so compile errors are surfaced immediately
#   with clear output, rather than buried in the test runner's timeout output.
# - The two jobs (pr-smoke, full-suite) are mutually exclusive by trigger type. If both
#   trigger somehow (shouldn't happen with the if: conditions), they are independent and
#   both run — that is safe.

name: fork-protocol-adapter-integration

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/fork-e2e-rust/**"
      - ".github/workflows/suite-05-fork-integration.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/fork-e2e-rust/**"
      - ".github/workflows/suite-05-fork-integration.yml"
  workflow_dispatch:

jobs:
  pr-smoke:
    name: fork-pr-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fork-e2e-${{ hashFiles('testing/fork-e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fork-e2e-

      - name: fmt + clippy
        working-directory: testing/fork-e2e-rust
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build test binaries
        working-directory: testing/fork-e2e-rust
        run: cargo test --no-run

      - name: PR smoke subset
        working-directory: testing/fork-e2e-rust
        run: cargo test --release abi_address_sanity vault_deposit_redeem_smoke -- --nocapture

  full-suite:
    name: fork-full-suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fork-e2e-${{ hashFiles('testing/fork-e2e-rust/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fork-e2e-

      - name: fmt + clippy
        working-directory: testing/fork-e2e-rust
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - name: Build test binaries
        working-directory: testing/fork-e2e-rust
        run: cargo test --no-run

      - name: Full fork integration suite
        working-directory: testing/fork-e2e-rust
        run: cargo test --release -- --nocapture
