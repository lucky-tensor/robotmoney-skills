# Phase 7 — OpenClaw E2E Demo on Recent Base Fork.
#
# Canonical: docs/technical/demo-runbook.md
# Implements: implementation-plan §13. Issue: #116.
#
# Two jobs:
#
# - `runbook-lint` — hermetic check that runs on every PR: validates that
#   the demo artifact files exist, the runbook references them correctly,
#   the failure-case toggle commands are present, and the skill snapshot
#   matches the canonical plugin directory.
#
# - `fork-smoke` — exercises the fork path when RMPC_FORK_RPC_URL is
#   available; skips loud-clean when it is not (same convention as
#   fork-e2e.yml and openclaw-config.yml).
#
# The demo does not require the Phase 5 API or Phase 6 dapp.
# All reads use rmpc get-* (direct JSON-RPC).

name: demo-e2e

on:
  push:
    branches: [main, dev]
    paths:
      - "docs/technical/demo-runbook.md"
      - "demo/**"
      - "testing/demo/**"
      - ".github/workflows/demo-e2e.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "docs/technical/demo-runbook.md"
      - "demo/**"
      - "testing/demo/**"
      - ".github/workflows/demo-e2e.yml"
  workflow_dispatch:

env:
  RMPC_FORK_BLOCK: "29800000"

jobs:
  runbook-lint:
    name: Demo runbook lint + artifact presence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required demo artifacts exist
        run: bash testing/demo/test_runbook_artifacts.sh

  fork-smoke:
    name: Demo fork smoke (failure-case toggles)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml', 'clients/rust-payment-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Fork smoke — failure cases (or skip-clean)
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: |
          if [ -z "$RMPC_FORK_RPC_URL" ]; then
            echo "::warning::RMPC_FORK_RPC_URL secret not configured; fork-smoke will skip-clean. Set the secret in repo settings to actually exercise the demo failure cases."
          fi
          bash testing/demo/test_failure_cases.sh
