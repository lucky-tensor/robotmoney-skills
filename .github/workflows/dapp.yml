name: dapp

on:
  push:
    branches: [main, dev]
    paths:
      - "clients/dapp/**"
      - "clients/rust-payment-client/**"
      - "contracts/**"
      - ".github/workflows/dapp.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "clients/dapp/**"
      - "clients/rust-payment-client/**"
      - "contracts/**"
      - ".github/workflows/dapp.yml"
  workflow_dispatch:

# Per the user memory "no fast-feedback optimization in test harness"
# we boot a real anvil sidecar for the Playwright fork run and accept
# the latency cost. The unit + lint job is fast and runs first; the
# E2E job runs in parallel.

jobs:
  # Issue #146 — the dapp Playwright job is the multi-service E2E in
  # this workflow; provision its devnet through the reusable k3d
  # workflow. Skip-cleans when RMPC_FORK_RPC_URL is absent (the
  # in-job Playwright runs continue to use a lightweight local anvil).
  devnet-up:
    name: Reusable k3d devnet boot (Playwright)
    uses: ./.github/workflows/_devnet-k3d.yml
    secrets:
      RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
    with:
      fork-block: "23500000"

  lint-unit:
    name: lint + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: clients/dapp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/dapp/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Format check
        run: pnpm fmt

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc -b

      - name: Vitest (unit + snapshot)
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-unit
    defaults:
      run:
        working-directory: clients/dapp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/dapp/pnpm-lock.yaml

      - name: Install Foundry (for anvil sidecar)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Playwright browsers
        run: pnpm test:e2e:install

      # Real anvil — see fork-e2e-decisions.md §3.5 for the ADR pattern.
      # We use a local devnet (no fork URL) for the dapp E2E because the
      # UI invariants we test do not require a forked block; a future
      # follow-up wires the same harness as testing/fork-e2e-rust for
      # the rmpc self-check round-trip.
      - name: Start anvil sidecar
        run: |
          anvil --silent --port 8545 &
          echo $! > anvil.pid
          for i in {1..30}; do
            if curl -sf -X POST -H 'content-type: application/json' \
                 --data '{"jsonrpc":"2.0","id":1,"method":"eth_chainId"}' \
                 http://127.0.0.1:8545 >/dev/null; then break; fi
            sleep 1
          done

      - name: Run Playwright
        env:
          VITE_USE_MOCK_WALLET: "true"
          VITE_FORK_RPC_URL: "http://127.0.0.1:8545"
          VITE_ENV_CLASS: "fork"
        run: pnpm test:e2e

      - name: Stop anvil
        if: always()
        run: |
          if [ -f anvil.pid ]; then kill "$(cat anvil.pid)" || true; fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: clients/dapp/playwright-report/
          retention-days: 7

  e2e-history-pane:
    name: playwright e2e — history pane (flag on)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-unit
    defaults:
      run:
        working-directory: clients/dapp
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/dapp/pnpm-lock.yaml

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Playwright browsers
        run: pnpm test:e2e:install

      # Same anvil sidecar pattern as the default e2e job — the
      # history-pane spec stubs the explorer API via Playwright route
      # interception, so anvil only needs to keep the dapp's wagmi
      # provider happy at boot.
      - name: Start anvil sidecar
        run: |
          anvil --silent --port 8545 &
          echo $! > anvil.pid
          for i in {1..30}; do
            if curl -sf -X POST -H 'content-type: application/json' \
                 --data '{"jsonrpc":"2.0","id":1,"method":"eth_chainId"}' \
                 http://127.0.0.1:8545 >/dev/null; then break; fi
            sleep 1
          done

      - name: Run Playwright (flag on, history-pane spec)
        env:
          VITE_USE_MOCK_WALLET: "true"
          VITE_FORK_RPC_URL: "http://127.0.0.1:8545"
          VITE_ENV_CLASS: "fork"
          VITE_HISTORY_PANE: "true"
          VITE_EXPLORER_API_URL: "http://127.0.0.1:9999"
        run: pnpm test:e2e tests/e2e/history-pane.spec.ts

      - name: Stop anvil
        if: always()
        run: |
          if [ -f anvil.pid ]; then kill "$(cat anvil.pid)" || true; fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-history-pane
          path: clients/dapp/playwright-report/
          retention-days: 7

  fork-roundtrip:
    name: dapp + rmpc fork-roundtrip
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: lint-unit
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/dapp/pnpm-lock.yaml

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: pnpm install
        working-directory: clients/dapp
        run: pnpm install --frozen-lockfile=false

      - name: Playwright browsers
        working-directory: clients/dapp
        run: pnpm exec playwright install --with-deps chromium

      # Issue #85 — drive the dapp UI to authorize then revoke against
      # a freshly-deployed gateway on a local anvil, then shell out to
      # `rmpc self-check` and assert exit code 2 + ErrAgentNotAuthorized
      # on the refusal path and exit code 0 after re-authorize. The
      # script handles boot, deploy, keystore mint, and Playwright
      # invocation; it exits non-zero on any failure in the round-trip.
      - name: Run fork-roundtrip harness
        run: bash clients/dapp/scripts/run-fork-roundtrip.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fork-roundtrip
          path: clients/dapp/playwright-report/
          retention-days: 7
