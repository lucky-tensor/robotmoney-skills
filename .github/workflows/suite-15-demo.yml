# Canonical: docs/implementation-plan.md §13 — Phase 7 OpenClaw E2E Demo
#
# WHY THIS SUITE EXISTS
# Phase 7 requires that the demo be reproducible from a clean checkout and
# that the happy-path succeeds only when a real guarded deposit is confirmed
# on-chain. This workflow exercises two verification levels:
#
#   1. drift-check (always): build rmpc and verify no demo document or script
#      cites flags that have been removed from `rmpc --help`. This catches
#      doc/script rot without needing an archive RPC.
#
#   2. demo-skip-clean (always): run demo.sh without RMPC_FORK_RPC_URL set and
#      confirm it exits 0, writes a SKIPPED marker, and does NOT write a
#      final-report.json with outcome=deposited. This proves the loud-clean
#      skip path never marks a false pass.
#
#   3. happy-path (manual/secret-gated): run demo.sh with RMPC_FORK_RPC_URL
#      set and assert the full locked success criteria (AC 1–4 in issue #151).
#      Skipped automatically when the secret is absent (no-fork-rpc-url
#      environments such as fork PRs).
#
#   4. failure-cases (manual/secret-gated): run test_failure_cases.sh and
#      assert all five failure cases produce the expected refusal.
#
# WHY drift-check RUNS FIRST
# A stale flag in demo.sh or the runbook means the demo can never pass on
# any environment. Catching it without an archive RPC saves secret quota.
#
# WHY THE SKIP MARKER IS CHECKED (NOT JUST EXIT CODE)
# demo.sh exits 0 for both a successful deposit and a clean skip.
# The SKIPPED file distinguishes the two cases so callers never mistake
# a skipped run for a passing deposit.
#
# GOTCHAS
# - RMPC_FORK_RPC_URL is an optional secret. When absent, jobs 3 and 4 exit
#   immediately (via the demo.sh preflight) with a SKIPPED marker. This is
#   intentional; do not add `if:` guards that fail on missing secrets — the
#   loud-clean skip is itself the tested behavior.
# - The demo artifacts directory is uploaded only when RMPC_FORK_RPC_URL is
#   present; the artifact upload step is conditional.

name: demo-openclaw-e2e

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/demo/**"
      - "docs/technical/demo-runbook.md"
      - "plugins/robotmoney-cli/skills/robotmoney-cli/**"
      - "clients/rust-payment-client/src/**"
      - ".github/workflows/suite-15-demo.yml"
  workflow_dispatch:

jobs:
  drift-check:
    name: rmpc-flag-drift-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc binary
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Check rmpc flag drift in demo docs and scripts
        run: bash testing/demo/check_rmpc_flag_drift.sh

  demo-skip-clean:
    name: demo-skip-clean-no-rpc
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: drift-check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc binary
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Install foundry (cast/anvil required for preflight even in skip path)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run demo without fork RPC (expect loud-clean skip)
        run: |
          set -euo pipefail
          RUN_DIR="$(mktemp -d)"
          # No RMPC_FORK_RPC_URL set — should skip cleanly.
          RMPC_DEMO_RUN_DIR="$RUN_DIR" bash testing/demo/demo.sh
          echo "demo.sh exited 0 (expected)"
          # Must have written a SKIPPED marker.
          if [[ ! -f "${RUN_DIR}/SKIPPED" ]]; then
            echo "::error::SKIPPED marker not written — demo.sh did not skip cleanly" >&2
            exit 1
          fi
          echo "SKIPPED marker present — skip-clean verified"
          # Must NOT have written a final-report.json with outcome=deposited.
          if [[ -f "${RUN_DIR}/final-report.json" ]]; then
            outcome="$(jq -r '.outcome // empty' "${RUN_DIR}/final-report.json" 2>/dev/null || true)"
            if [[ "$outcome" == "deposited" ]]; then
              echo "::error::final-report.json has outcome=deposited on skip run — false pass detected" >&2
              exit 1
            fi
          fi
          echo "No false-deposited outcome — demo skip-clean verified."

  happy-path:
    name: demo-happy-path
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: demo-skip-clean
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc binary
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Install foundry (anvil + cast)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run demo happy-path against fork
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: |
          set -euo pipefail
          RUN_DIR="$(mktemp -d)"
          RMPC_DEMO_RUN_DIR="$RUN_DIR" bash testing/demo/demo.sh
          echo "demo.sh exited 0"
          # Check for skip (secret absent).
          if [[ -f "${RUN_DIR}/SKIPPED" ]]; then
            echo "RMPC_FORK_RPC_URL secret absent — happy-path skipped cleanly"
            exit 0
          fi
          # Assert locked success criteria (issue #151 AC 1).
          echo "Verifying final-report.json..."
          for field in outcome tx_hash deposit_id gas_used vault_totalAssets_before vault_totalAssets_after; do
            val="$(jq -r ".${field}" "${RUN_DIR}/final-report.json" 2>/dev/null || echo "null")"
            if [[ "$val" == "null" || -z "$val" ]]; then
              echo "::error::final-report.json.${field} is null or missing" >&2
              exit 1
            fi
          done
          outcome="$(jq -r '.outcome' "${RUN_DIR}/final-report.json")"
          if [[ "$outcome" != "deposited" ]]; then
            echo "::error::expected outcome=deposited, got '${outcome}'" >&2
            exit 1
          fi
          echo "All assertions passed. outcome=${outcome}"
          echo "RUN_DIR=${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Upload demo artifacts
        if: ${{ env.RMPC_FORK_RPC_URL != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: demo-happy-path-artifacts
          path: artifacts/demo/
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}

  failure-cases:
    name: demo-failure-cases
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: demo-skip-clean
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc binary
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Install foundry (anvil + cast)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run all five failure cases
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
        run: bash testing/demo/test_failure_cases.sh
