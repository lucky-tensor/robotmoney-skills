# Phase 4 — OpenClaw install + long-running task config.
#
# Canonical: docs/walkthroughs/openclaw-config.md
# Implements: implementation-plan §10. Issue: #114.
#
# - `hermetic` runs the three always-safe tests (mainnet gate, secret
#   handling, doc parity) on every PR and push. No fork RPC required.
# - `check-fork-rpc` gates `fork-long-running` on RMPC_FORK_RPC_URL;
#   when absent fork-long-running is marked SKIPPED (not passed).
name: openclaw-config

on:
  push:
    branches: [main, dev]
    paths:
      - "testing/openclaw-config/**"
      - "docs/walkthroughs/openclaw-config.md"
      - "clients/rust-payment-client/**"
      - ".github/workflows/openclaw-config.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "testing/openclaw-config/**"
      - "docs/walkthroughs/openclaw-config.md"
      - "clients/rust-payment-client/**"
      - ".github/workflows/openclaw-config.yml"
  workflow_dispatch:

jobs:
  hermetic:
    name: OpenClaw hermetic tests (mainnet gate + secret handling + doc parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml', 'clients/rust-payment-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Shellcheck
        run: shellcheck -x testing/openclaw-config/*.sh

      - name: Build rmpc
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Mainnet gate test
        run: bash testing/openclaw-config/test_mainnet_gate.sh

      - name: Secret-handling test
        run: bash testing/openclaw-config/test_secret_handling.sh

      - name: Doc-parity test
        run: bash testing/openclaw-config/test_doc_parity.sh

  check-fork-rpc:
    name: Check RMPC_FORK_RPC_URL
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}
    steps:
      - name: Verify secret present
        id: check
        env:
          HAS_FORK_RPC: ${{ secrets.RMPC_FORK_RPC_URL != '' }}
        run: |
          if [ "$HAS_FORK_RPC" = "true" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::RMPC_FORK_RPC_URL not configured — fork-long-running will be skipped"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  fork-long-running:
    name: OpenClaw long-running monitor test (fork)
    needs: [hermetic, check-fork-rpc]
    if: needs.check-fork-rpc.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/rust-payment-client/target
          key: ${{ runner.os }}-cargo-rmpc-${{ hashFiles('clients/rust-payment-client/Cargo.toml', 'clients/rust-payment-client/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rmpc-

      - name: Build rmpc
        run: cargo build --manifest-path clients/rust-payment-client/Cargo.toml --bin rmpc

      - name: Long-running monitor test
        id: long_running
        env:
          RMPC_FORK_RPC_URL: ${{ secrets.RMPC_FORK_RPC_URL }}
          RMPC_MONITOR_ITERATIONS: "3"
          RMPC_MONITOR_INTERVAL_SECS: "1"
        run: |
          set +e
          mkdir -p artifacts/long-running
          OUTCOME_FILE="artifacts/long-running/outcome.txt"
          LOG_FILE="artifacts/long-running/test_long_running.log"

          bash testing/openclaw-config/test_long_running.sh >"$LOG_FILE" 2>&1
          rc=$?
          cat "$LOG_FILE"
          if [ "$rc" -eq 0 ]; then
            { echo "outcome=pass"; echo "reason=test_long_running.sh exited 0"; } >"$OUTCOME_FILE"
            echo "outcome=pass" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          { echo "outcome=fail"; echo "reason=test_long_running.sh exited ${rc}"; } >"$OUTCOME_FILE"
          echo "outcome=fail" >>"$GITHUB_OUTPUT"
          exit "$rc"

      - name: Upload long-running outcome artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-long-running-outcome
          path: artifacts/long-running/
          if-no-files-found: error

      - name: Assert long-running outcome artifact is well-formed
        if: always()
        run: |
          set -euo pipefail
          OUTCOME_FILE="artifacts/long-running/outcome.txt"
          if [ ! -f "$OUTCOME_FILE" ]; then
            echo "::error::long-running outcome artifact missing at ${OUTCOME_FILE}"
            exit 1
          fi
          OUTCOME_LINE="$(grep '^outcome=' "$OUTCOME_FILE" || true)"
          REASON_LINE="$(grep '^reason=' "$OUTCOME_FILE" || true)"
          case "$OUTCOME_LINE" in
            outcome=pass|outcome=fail) ;;
            *)
              echo "::error::outcome artifact has invalid outcome line: '${OUTCOME_LINE}'"
              exit 1
              ;;
          esac
          if [ -z "$REASON_LINE" ]; then
            echo "::error::outcome artifact missing reason= line"
            exit 1
          fi
          echo "Long-running outcome artifact OK:"
          cat "$OUTCOME_FILE"
